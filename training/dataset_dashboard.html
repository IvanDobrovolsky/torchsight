<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TorchSight — Dataset Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #d1d5db; font-family: 'Inter', system-ui, sans-serif; padding: 40px; }
  h1 { color: #c4b5fd; font-size: 28px; margin-bottom: 6px; }
  .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 40px; }
  .stats-row { display: flex; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
  .stat-card { background: #111118; border: 1px solid #1e1e2e; border-radius: 12px; padding: 24px; min-width: 180px; flex: 1; }
  .stat-card .number { font-size: 36px; font-weight: 700; color: #c4b5fd; }
  .stat-card .label { font-size: 13px; color: #6b7280; margin-top: 4px; }
  .section { margin-bottom: 48px; }
  .section h2 { color: #e5e7eb; font-size: 18px; margin-bottom: 16px; border-bottom: 1px solid #1e1e2e; padding-bottom: 8px; }
  .chart-container { background: #111118; border: 1px solid #1e1e2e; border-radius: 12px; padding: 24px; }
  .bar-row { display: flex; align-items: center; margin-bottom: 8px; gap: 12px; }
  .bar-label { width: 260px; font-size: 12px; font-family: 'Fira Code', monospace; color: #9ca3af; text-align: right; white-space: nowrap; flex-shrink: 0; }
  .bar-track { flex: 1; height: 22px; background: #1a1a24; border-radius: 4px; overflow: hidden; display: flex; position: relative; }
  .bar-fill-real { background: #7c3aed; height: 100%; transition: width 0.5s; }
  .bar-fill-synth { background: #22d3ee; height: 100%; opacity: 0.6; transition: width 0.5s; }
  .bar-count { width: 70px; font-size: 11px; font-family: 'Fira Code', monospace; color: #6b7280; text-align: right; flex-shrink: 0; }
  .legend { display: flex; gap: 24px; margin-bottom: 20px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #9ca3af; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  .legend-dot.real { background: #7c3aed; }
  .legend-dot.synth { background: #22d3ee; opacity: 0.6; }
  .pie-section { display: flex; gap: 40px; align-items: center; flex-wrap: wrap; }
  .pie-wrap { position: relative; width: 280px; height: 280px; flex-shrink: 0; }
  .pie-wrap canvas { width: 280px; height: 280px; }
  .pie-legend { font-size: 13px; line-height: 2; }
  .pie-legend-item { display: flex; align-items: center; gap: 8px; }
  .pie-legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .cat-group { margin-bottom: 4px; }
  .cat-header { font-size: 11px; font-weight: 600; color: #7c3aed; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 6px 0; padding-left: 272px; }
  .thin-badge { display: inline-block; background: #7f1d1d; color: #fca5a5; font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-left: 8px; }
</style>
</head>
<body>

<h1>TorchSight Dataset Dashboard</h1>
<p class="subtitle">105,168 samples across 51 subcategories — all license-verified, all at 500+ minimum, 17.6% safe data</p>

<div class="stats-row" id="stats-row"></div>

<div class="section">
  <h2>Category Overview</h2>
  <div class="pie-section">
    <div class="pie-wrap"><canvas id="pie" width="280" height="280"></canvas></div>
    <div class="pie-legend" id="pie-legend"></div>
  </div>
</div>

<div class="section">
  <h2>Coverage by Subcategory</h2>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot real"></div> Real data</div>
    <div class="legend-item"><div class="legend-dot synth"></div> Synthetic data</div>
  </div>
  <div class="chart-container" id="bars"></div>
</div>

<div class="section">
  <h2>Data Source Breakdown</h2>
  <div class="chart-container" id="sources"></div>
</div>

<script>
const data = {
  "confidential.classified": { real: 0, synthetic: 600 },
  "confidential.education": { real: 0, synthetic: 500 },
  "confidential.geospatial": { real: 0, synthetic: 500 },
  "confidential.intelligence": { real: 65, synthetic: 500 },
  "confidential.internal": { real: 1551, synthetic: 0 },
  "confidential.military": { real: 109, synthetic: 500 },
  "confidential.military_comms": { real: 0, synthetic: 500 },
  "confidential.nuclear": { real: 10, synthetic: 500 },
  "confidential.weapons_systems": { real: 50, synthetic: 500 },
  "credentials.api_key": { real: 0, synthetic: 600 },
  "credentials.cicd": { real: 0, synthetic: 500 },
  "credentials.cloud_config": { real: 0, synthetic: 500 },
  "credentials.connection_string": { real: 0, synthetic: 500 },
  "credentials.container": { real: 0, synthetic: 500 },
  "credentials.password": { real: 683, synthetic: 0 },
  "credentials.private_key": { real: 0, synthetic: 500 },
  "credentials.token": { real: 4858, synthetic: 500 },
  "financial.bank_account": { real: 0, synthetic: 500 },
  "financial.credit_card": { real: 0, synthetic: 600 },
  "financial.tax": { real: 0, synthetic: 500 },
  "financial.transaction": { real: 561, synthetic: 0 },
  "malicious.deserialization": { real: 36, synthetic: 500 },
  "malicious.exploit": { real: 44118, synthetic: 0 },
  "malicious.injection": { real: 11299, synthetic: 0 },
  "malicious.malware": { real: 785, synthetic: 0 },
  "malicious.phishing": { real: 0, synthetic: 2000 },
  "malicious.prompt_injection": { real: 263, synthetic: 500 },
  "malicious.prototype_pollution": { real: 30, synthetic: 500 },
  "malicious.redos": { real: 30, synthetic: 500 },
  "malicious.shell": { real: 175, synthetic: 500 },
  "malicious.ssrf": { real: 153, synthetic: 500 },
  "malicious.ssti": { real: 43, synthetic: 500 },
  "malicious.steganography": { real: 0, synthetic: 500 },
  "malicious.supply_chain": { real: 5720, synthetic: 500 },
  "malicious.xxe": { real: 56, synthetic: 500 },
  "medical.diagnosis": { real: 1542, synthetic: 0 },
  "medical.insurance": { real: 0, synthetic: 500 },
  "medical.lab_result": { real: 447, synthetic: 500 },
  "medical.prescription": { real: 967, synthetic: 0 },
  "pii.behavioral": { real: 0, synthetic: 500 },
  "pii.biometric": { real: 0, synthetic: 500 },
  "pii.contact": { real: 2000, synthetic: 0 },
  "pii.government_id": { real: 0, synthetic: 600 },
  "pii.identity": { real: 3994, synthetic: 0 },
  "pii.metadata": { real: 0, synthetic: 500 },
  "safe.business": { real: 0, synthetic: 3000 },
  "safe.code": { real: 0, synthetic: 3500 },
  "safe.config": { real: 0, synthetic: 3000 },
  "safe.documentation": { real: 0, synthetic: 3500 },
  "safe.email": { real: 0, synthetic: 3000 },
  "safe.media": { real: 0, synthetic: 2500 },
};

const sourceData = {
  "NVD (CVEs)": { count: 50000, color: "#ef4444", license: "Public Domain" },
  "OSSF Malicious Pkgs": { count: 5000, color: "#f43f5e", license: "Apache-2.0" },
  "GitHub Advisories": { count: 3000, color: "#fb923c", license: "CC-BY-4.0" },
  "SecLists (Payloads)": { count: 3229, color: "#f97316", license: "MIT" },
  "Enron (Emails)": { count: 2000, color: "#eab308", license: "Public Domain" },
  "MTSamples (Medical)": { count: 2000, color: "#22c55e", license: "CC0" },
  "MITRE ATT&CK": { count: 1620, color: "#3b82f6", license: "Apache-2.0" },
  "Prompt Injection": { count: 263, color: "#818cf8", license: "Apache-2.0" },
  "CRS Reports": { count: 156, color: "#8b5cf6", license: "Public Domain" },
  "Synthetic Generated": { count: 37900, color: "#22d3ee", license: "Generated" },
};

// Stats
const totalReal = Object.values(data).reduce((s, d) => s + d.real, 0);
const totalSynth = Object.values(data).reduce((s, d) => s + d.synthetic, 0);
const total = totalReal + totalSynth;
const subcatCount = Object.keys(data).length;
const fullySynth = Object.values(data).filter(d => d.real === 0 && d.synthetic > 0).length;
const fullyCovered = Object.values(data).filter(d => d.real > 0 && d.synthetic === 0).length;

document.getElementById("stats-row").innerHTML = [
  { n: total.toLocaleString(), l: "Total Samples" },
  { n: subcatCount, l: "Subcategories" },
  { n: totalReal.toLocaleString(), l: "Real Data" },
  { n: totalSynth.toLocaleString(), l: "Synthetic Data" },
  { n: fullyCovered, l: "Fully Real" },
  { n: fullySynth, l: "Fully Synthetic" },
].map(s => `<div class="stat-card"><div class="number">${s.n}</div><div class="label">${s.l}</div></div>`).join("");

// Pie chart by L1 category
const catColors = {
  pii: "#3b82f6",
  credentials: "#f97316",
  financial: "#eab308",
  medical: "#22c55e",
  confidential: "#8b5cf6",
  malicious: "#ef4444",
  safe: "#6b7280",
};

const catTotals = {};
for (const [k, v] of Object.entries(data)) {
  const cat = k.split(".")[0];
  catTotals[cat] = (catTotals[cat] || 0) + v.real + v.synthetic;
}

const canvas = document.getElementById("pie");
const ctx = canvas.getContext("2d");
const cx = 140, cy = 140, r = 120;
let angle = -Math.PI / 2;
const catEntries = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
const pieTotal = catEntries.reduce((s, [, v]) => s + v, 0);

for (const [cat, count] of catEntries) {
  const slice = (count / pieTotal) * Math.PI * 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, angle, angle + slice);
  ctx.fillStyle = catColors[cat] || "#444";
  ctx.fill();
  angle += slice;
}
// Center hole
ctx.beginPath();
ctx.arc(cx, cy, 60, 0, Math.PI * 2);
ctx.fillStyle = "#111118";
ctx.fill();
ctx.fillStyle = "#c4b5fd";
ctx.font = "bold 22px system-ui";
ctx.textAlign = "center";
ctx.fillText(total.toLocaleString(), cx, cy + 2);
ctx.fillStyle = "#6b7280";
ctx.font = "11px system-ui";
ctx.fillText("samples", cx, cy + 18);

document.getElementById("pie-legend").innerHTML = catEntries.map(([cat, count]) => {
  const pct = ((count / pieTotal) * 100).toFixed(1);
  return `<div class="pie-legend-item"><div class="pie-legend-dot" style="background:${catColors[cat]}"></div>${cat} — ${count.toLocaleString()} (${pct}%)</div>`;
}).join("");

// Bar chart
const maxTotal = Math.max(...Object.values(data).map(d => d.real + d.synthetic));
const sorted = Object.entries(data).sort((a, b) => {
  const catA = a[0].split(".")[0], catB = b[0].split(".")[0];
  if (catA !== catB) return catA.localeCompare(catB);
  return (b[1].real + b[1].synthetic) - (a[1].real + a[1].synthetic);
});

let barsHtml = "";
let lastCat = "";
for (const [sub, vals] of sorted) {
  const cat = sub.split(".")[0];
  if (cat !== lastCat) {
    const catLabels = { pii: "PII", credentials: "CREDENTIALS", financial: "FINANCIAL", medical: "MEDICAL", confidential: "CONFIDENTIAL", malicious: "MALICIOUS", safe: "SAFE" };
    barsHtml += `<div class="cat-header">${catLabels[cat] || cat}</div>`;
    lastCat = cat;
  }
  const t = vals.real + vals.synthetic;
  // Cap bar width for readability (malicious.exploit is huge)
  const cappedMax = 3000;
  const realW = Math.min(vals.real / cappedMax * 100, 100);
  const synthW = Math.min(vals.synthetic / cappedMax * 100, 100 - realW);
  const thinBadge = t < 150 ? '<span class="thin-badge">thin</span>' : '';
  barsHtml += `<div class="bar-row">
    <div class="bar-label">${sub}${thinBadge}</div>
    <div class="bar-track">
      <div class="bar-fill-real" style="width:${realW}%"></div>
      <div class="bar-fill-synth" style="width:${synthW}%"></div>
    </div>
    <div class="bar-count">${t > cappedMax ? t.toLocaleString() : t}</div>
  </div>`;
}
document.getElementById("bars").innerHTML = barsHtml;

// Source breakdown
const srcMax = Math.max(...Object.values(sourceData).map(s => s.count));
const srcCapped = 10000;
document.getElementById("sources").innerHTML = Object.entries(sourceData)
  .sort((a, b) => b[1].count - a[1].count)
  .map(([name, { count, color, license }]) => {
    const w = Math.min(count / srcCapped * 100, 100);
    const licBadge = license ? `<span style="font-size:9px;color:#6b7280;margin-left:6px">${license}</span>` : '';
    return `<div class="bar-row">
      <div class="bar-label">${name}${licBadge}</div>
      <div class="bar-track">
        <div class="bar-fill-real" style="width:${w}%;background:${color}"></div>
      </div>
      <div class="bar-count">${count.toLocaleString()}</div>
    </div>`;
  }).join("");
</script>
</body>
</html>
