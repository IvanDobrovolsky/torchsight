name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: torchsight-macos-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: torchsight-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: torchsight-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/torchsight.exe ${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/torchsight ${{ matrix.name }}
            chmod +x ${{ matrix.name }}
          fi

      # macOS: sign CLI binary with Developer ID
      - name: Sign macOS binary
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p actions build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p actions build.keychain
            security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
            codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" ${{ matrix.name }}
          else
            echo "⚠ No signing certificate configured — skipping code signing"
          fi

      # Windows: sign CLI binary with Authenticode
      - name: Sign Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ($env:WINDOWS_CERTIFICATE) {
            $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
            [IO.File]::WriteAllBytes("certificate.pfx", $certBytes)
            & signtool sign /f certificate.pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 "${{ matrix.name }}"
            Remove-Item certificate.pfx
          } else {
            Write-Host "⚠ No signing certificate configured — skipping code signing"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: TorchSight-macos-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: TorchSight-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: TorchSight-windows-x86_64

    runs-on: ${{ matrix.os }}
    env:
      # macOS signing — Tauri reads these automatically.
      # APPLE_CERTIFICATE is intentionally NOT here: Tauri's bundler does its own
      # `security import` if it sees that env var, which conflicts with the manual
      # keychain we set up below. We import the cert ourselves and let Tauri sign
      # against the existing keychain via APPLE_SIGNING_IDENTITY only.
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      # Windows signing
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      # macOS: import signing certificate into keychain (scoped step env so
      # APPLE_CERTIFICATE is not visible to the Tauri build step).
      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then exit 0; fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      # Windows: write certificate to disk for signtool
      - name: Import Windows signing certificate
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\certificate.pfx", $certBytes)
          echo "TAURI_SIGNING_CERTIFICATE=$env:RUNNER_TEMP\certificate.pfx" >> $env:GITHUB_ENV

      - name: Install desktop deps
        working-directory: desktop
        run: npm install

      - name: Build desktop app
        working-directory: desktop
        run: npm run tauri build

      # macOS: notarize the DMG
      - name: Notarize macOS DMG
        if: runner.os == 'macOS' && env.APPLE_ID != ''
        run: |
          DMG=$(find desktop/src-tauri/target/release/bundle/dmg -name '*.dmg' | head -1)
          if [ -n "$DMG" ]; then
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$DMG"
          fi

      # Windows: sign the NSIS installer
      - name: Sign Windows installer
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $exe = Get-ChildItem "desktop\src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1
          if ($exe) {
            & signtool sign /f "$env:RUNNER_TEMP\certificate.pfx" /p $env:WINDOWS_CERTIFICATE_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exe.FullName
          }

      # macOS → .dmg
      - name: Upload DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}.dmg
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg

      # Linux → .AppImage + .deb
      - name: Upload AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}.AppImage
          path: desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

      - name: Upload Deb
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}.deb
          path: desktop/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: ignore

      # Windows → .nsis installer
      - name: Upload NSIS installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-setup.exe
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  build-windows-installer:
    needs: build-cli
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Content VERSION -Raw).Trim()
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Download signed CLI exe
        uses: actions/download-artifact@v4
        with:
          name: torchsight-windows-x86_64.exe
          path: cli-artifact

      - name: Stage CLI exe for installer
        shell: pwsh
        run: |
          $dst = "target\x86_64-pc-windows-msvc\release"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Copy-Item cli-artifact\torchsight-windows-x86_64.exe (Join-Path $dst "torchsight.exe")

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        working-directory: installer/windows
        run: .\build.ps1 -Version "${{ steps.ver.outputs.version }}" -SkipCargo

      - name: Sign installer
        if: env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $pfx = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          [IO.File]::WriteAllBytes($pfx, $certBytes)
          $exe = "installer\windows\dist\TorchSight-Setup-${{ steps.ver.outputs.version }}.exe"
          & signtool sign /f $pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exe
          if ($LASTEXITCODE -ne 0) { throw "signtool failed" }
          Remove-Item $pfx

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TorchSight-Setup
          path: installer/windows/dist/TorchSight-Setup-*.exe

  release:
    needs: [build-cli, build-desktop, build-windows-installer]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "torchsight-*" -o -name "TorchSight*" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
