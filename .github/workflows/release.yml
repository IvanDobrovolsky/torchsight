name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: torchsight-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            name: torchsight-macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: torchsight-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: torchsight-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/torchsight.exe ${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/torchsight ${{ matrix.name }}
            chmod +x ${{ matrix.name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: TorchSight-macos-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: TorchSight-linux-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      - name: Install desktop deps
        working-directory: desktop
        run: npm install

      - name: Build desktop app
        working-directory: desktop
        run: npm run tauri build

      - name: Package artifacts
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp desktop/src-tauri/target/release/bundle/dmg/*.dmg "${{ matrix.name }}.dmg"
          else
            cp desktop/src-tauri/target/release/bundle/appimage/*.AppImage "${{ matrix.name }}.AppImage" 2>/dev/null || true
            cp desktop/src-tauri/target/release/bundle/deb/*.deb "${{ matrix.name }}.deb" 2>/dev/null || true
          fi

      - name: Upload DMG
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}.dmg
          path: ${{ matrix.name }}.dmg

      - name: Upload AppImage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}.AppImage
          path: ${{ matrix.name }}.AppImage

      - name: Upload Deb
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}.deb
          path: ${{ matrix.name }}.deb
          if-no-files-found: ignore

  release:
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "torchsight-*" -o -name "TorchSight-*" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
