name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── CLI: lint, build, test on all platforms ──
  cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnyi/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Lint
        run: cargo clippy --target ${{ matrix.target }} -- -D warnings

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Test
        run: cargo test --target ${{ matrix.target }}

  # ── Desktop: build on all platforms ──
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS ARM
          - os: ubuntu-latest
            name: Linux x86_64
          - os: windows-latest
            name: Windows x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnyi/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.os }}

      - name: Install desktop deps
        working-directory: desktop
        run: npm install

      - name: Build desktop app
        working-directory: desktop
        run: npm run tauri build
