<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="beamMain" x1="0%" y1="100%" x2="20%" y2="0%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.75"/>
      <stop offset="30%" stop-color="#6366F1" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#38BDF8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E0F2FE" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="beamTeal" x1="100%" y1="100%" x2="80%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.5"/>
      <stop offset="45%" stop-color="#38BDF8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A5B4FC" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="coreStreak" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="20%" stop-color="#E9D5FF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#A5B4FC" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7DD3FC" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="coreWide" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.4"/>
      <stop offset="30%" stop-color="#818CF8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7DD3FC" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="flare" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0"/>
      <stop offset="30%" stop-color="#C084FC" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="sourceGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#E9D5FF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#A855F7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <filter id="sourceBloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Dark background for icon -->
  <rect width="512" height="512" rx="80" fill="#0F0E17"/>

  <!-- Beam cones -->
  <polygon points="215,370 140,40 372,40 297,370" fill="url(#beamMain)" opacity="0.6"/>
  <polygon points="222,370 150,48 364,48 290,370" fill="url(#beamTeal)" opacity="0.4"/>

  <!-- Wide core glow -->
  <rect x="240" y="38" width="32" height="332" fill="url(#coreWide)" opacity="0.5" rx="16"/>

  <!-- Core streak -->
  <rect x="250" y="35" width="12" height="335" fill="url(#coreStreak)" opacity="0.8" rx="6"/>

  <!-- Bright center line -->
  <rect x="254" y="40" width="4" height="328" fill="#FFFFFF" opacity="0.15" rx="2"/>

  <!-- Source bloom -->
  <ellipse cx="256" cy="370" rx="32" ry="9" fill="#C084FC" opacity="0.3" filter="url(#sourceBloom)"/>

  <!-- Source point -->
  <ellipse cx="256" cy="370" rx="16" ry="6" fill="url(#sourceGlow)" opacity="0.7"/>
  <ellipse cx="256" cy="370" rx="7" ry="3.5" fill="#FFFFFF" opacity="0.9"/>
  <ellipse cx="256" cy="370" rx="3" ry="1.8" fill="#FFFFFF"/>

  <!-- Horizontal flare -->
  <rect x="170" y="369" width="172" height="2.5" fill="url(#flare)" opacity="0.55" rx="1.25"/>
  <rect x="145" y="369.8" width="222" height="1.2" fill="url(#flare)" opacity="0.2" rx="0.6"/>

  <!-- Particles -->
  <circle cx="246" cy="85" r="2.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="268" cy="145" r="2" fill="#C084FC" opacity="0.7"/>
  <circle cx="241" cy="205" r="2.2" fill="#67E8F9" opacity="0.6"/>
  <circle cx="264" cy="265" r="1.8" fill="#A78BFA" opacity="0.55"/>
  <circle cx="252" cy="120" r="1.7" fill="#22D3EE" opacity="0.65"/>
  <circle cx="261" cy="175" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="254" cy="240" r="1.6" fill="#E9D5FF" opacity="0.45"/>
  <circle cx="249" cy="330" r="1.5" fill="#67E8F9" opacity="0.4"/>
  <circle cx="258" cy="300" r="1.4" fill="#C084FC" opacity="0.4"/>

  <!-- Torch handle -->
  <rect x="249" y="376" width="14" height="48" rx="2.5" fill="#1A1328"/>
  <line x1="251.5" y1="389" x2="260.5" y2="389" stroke="#2A2040" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="251.5" y1="396" x2="260.5" y2="396" stroke="#2A2040" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="251.5" y1="403" x2="260.5" y2="403" stroke="#2A2040" stroke-width="0.8" stroke-linecap="round"/>
  <rect x="244" y="422" width="24" height="5" rx="2" fill="#1A1328"/>
</svg>
